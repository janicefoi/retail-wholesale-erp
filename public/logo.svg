<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 160" width="460" height="160">

  <!--
    JSH Motorcycle Spare Parts — Brand Logo
    Layout: gear-badge (left) · vertical rule · wordmark + tagline (right)
    Primary  : #38bdf8  (deep navy)
    Accent   : #ffffff  (orange)
  -->

  <!-- ══════════════════════════════════════════
       GEAR BADGE
       8-tooth gear   inner-r=52  outer-r=68
       centered at   (80, 80)
  ══════════════════════════════════════════ -->

  <!-- Gear body (navy) -->
  <polygon
    fill="#38bdf8"
    points="
      60.1,32.0  66.7,13.3  90.6,12.8  99.9,32.0
     117.8,23.5 135.0,40.0 128.0,60.1 147.2,69.4
     147.2,90.6 128.0,99.9 135.0,120.0 117.8,136.5
      99.9,128.0  90.6,147.2  66.7,146.7  60.1,128.0
      42.2,136.5  25.0,120.0  32.0,99.9  12.8,90.6
      12.8,69.4   32.0,60.1   25.0,40.0  42.2,23.5
    "/>

  <!-- Orange accent ring (sits between gear body and white field) -->
  <circle cx="80" cy="80" r="43" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- White inner field -->
  <circle cx="80" cy="80" r="40" fill="#ffffff"/>

  <!-- Wheel rim -->
  <circle cx="80" cy="80" r="31" fill="none" stroke="#38bdf8" stroke-width="4.5"/>

  <!-- 6 spokes -->
  <g stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round">
    <line x1="80" y1="80" x2="80"  y2="50"/>
    <line x1="80" y1="80" x2="80"  y2="50" transform="rotate( 60 80 80)"/>
    <line x1="80" y1="80" x2="80"  y2="50" transform="rotate(120 80 80)"/>
    <line x1="80" y1="80" x2="80"  y2="50" transform="rotate(180 80 80)"/>
    <line x1="80" y1="80" x2="80"  y2="50" transform="rotate(240 80 80)"/>
    <line x1="80" y1="80" x2="80"  y2="50" transform="rotate(300 80 80)"/>
  </g>

  <!-- Axle hub -->
  <circle cx="80" cy="80" r="9"   fill="#ffffff"/>
  <circle cx="80" cy="80" r="4.5" fill="#38bdf8"/>


  <!-- ══════════════════════════════════════════
       VERTICAL RULE
  ══════════════════════════════════════════ -->
  <line x1="162" y1="22" x2="162" y2="138" stroke="#7dd3fc" stroke-width="1.5"/>


  <!-- ══════════════════════════════════════════
       WORDMARK
  ══════════════════════════════════════════ -->
  <text
    x="178" y="100"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="74"
    fill="#38bdf8"
    letter-spacing="-2">JSH</text>


  <!-- ══════════════════════════════════════════
       TAGLINE
  ══════════════════════════════════════════ -->
  <text
    x="181" y="124"
    font-family="Arial,Helvetica,sans-serif"
    font-weight="700"
    font-size="13"
    fill="#ffffff"
    letter-spacing="3.5">MOTORCYCLE SPARE PARTS</text>

  <!-- Orange underline -->
  <rect x="181" y="133" width="250" height="3.5" rx="1.75" fill="#ffffff"/>

</svg>
